name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.3"
          extended: true

      - name: Build
        run: hugo --gc --minify --panicOnWarning

      - name: Validate generated site
        run: python3 scripts/check_site.py public

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: ppxinashin/ppxinashin.github.io
          personal_token: ${{ secrets.DEPLOY_SECRET }}
          publish_dir: ./public
          publish_branch: main
